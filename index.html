<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:monospace;-webkit-overflow-scrolling:touch;}
#wrap{position:fixed;top:0;left:0;right:0;bottom:0;display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;}
#hud{background:rgba(0,0,0,0.9);color:#fff;font-size:12px;padding:4px 10px;display:-webkit-flex;display:flex;-webkit-justify-content:space-between;justify-content:space-between;-webkit-align-items:center;align-items:center;border-bottom:2px solid #333;-webkit-flex-shrink:0;flex-shrink:0;gap:4px;}
#hud span{color:#ffd700;}
#gameArea{position:relative;-webkit-flex:1;flex:1;overflow:hidden;}
canvas{display:block;width:100%;height:100%;}

/* CONTROLS OVERLAY */
#ctrl{
  position:absolute;bottom:0;left:0;right:0;z-index:10;
  display:-webkit-flex;display:flex;
  -webkit-justify-content:space-between;justify-content:space-between;
  -webkit-align-items:flex-end;align-items:flex-end;
  padding:10px 16px 14px;
  background:-webkit-linear-gradient(bottom,rgba(0,0,0,0.35),transparent);
  background:linear-gradient(to top,rgba(0,0,0,0.35),transparent);
  pointer-events:none;
}
/* LEFT: move joystick */
#jzone{pointer-events:all;position:relative;width:130px;height:130px;}
#jbase{position:absolute;top:0;left:0;right:0;bottom:0;border-radius:50%;background:-webkit-radial-gradient(38% 32%,circle,rgba(28,28,60,0.45),rgba(6,6,18,0.45));background:radial-gradient(circle at 38% 32%,rgba(28,28,60,0.45),rgba(6,6,18,0.45));border:2px solid rgba(70,70,130,0.45);}
#jbase::before{content:'';position:absolute;top:11px;left:11px;right:11px;bottom:11px;border-radius:50%;border:1px dashed rgba(255,255,255,0.05);}
#jknob{position:absolute;width:52px;height:52px;border-radius:50%;background:-webkit-radial-gradient(36% 30%,circle,rgba(130,145,255,0.7),rgba(22,38,200,0.7));background:radial-gradient(circle at 36% 30%,rgba(130,145,255,0.7),rgba(22,38,200,0.7));border:2px solid rgba(160,180,255,0.55);top:50%;left:50%;-webkit-transform:translate(-50%,-50%);transform:translate(-50%,-50%);pointer-events:none;}

/* Jump button — below fire on right */
#bjump{
  pointer-events:all;width:72px;height:72px;
  border-radius:50%;border:2px solid rgba(160,255,180,0.45);
  background:-webkit-radial-gradient(36% 30%,circle,rgba(80,230,110,0.45),rgba(14,110,44,0.45));
  background:radial-gradient(circle at 36% 30%,rgba(80,230,110,0.45),rgba(14,110,44,0.45));
  display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;
  font-size:11px;font-weight:bold;color:rgba(255,255,255,0.85);cursor:pointer;
  -webkit-transition:-webkit-transform 0.07s;transition:transform 0.07s;
}
#bjump.pr{-webkit-transform:scale(0.87);transform:scale(0.87);}

/* RIGHT: fire + jump stacked */
#rightCol{pointer-events:all;display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;-webkit-align-items:center;align-items:center;gap:8px;}
#fzone{position:relative;width:130px;height:130px;}
#fbase{position:absolute;top:0;left:0;right:0;bottom:0;border-radius:50%;background:-webkit-radial-gradient(38% 32%,circle,rgba(60,8,8,0.45),rgba(18,0,0,0.45));background:radial-gradient(circle at 38% 32%,rgba(60,8,8,0.45),rgba(18,0,0,0.45));border:2px solid rgba(200,50,50,0.45);}
#fbase::before{content:'ATES';position:absolute;top:0;left:0;right:0;bottom:0;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;font-size:11px;color:rgba(255,100,100,0.22);font-weight:bold;pointer-events:none;}
#fknob{position:absolute;width:52px;height:52px;border-radius:50%;background:-webkit-radial-gradient(36% 30%,circle,rgba(255,90,60,0.75),rgba(170,14,0,0.75));background:radial-gradient(circle at 36% 30%,rgba(255,90,60,0.75),rgba(170,14,0,0.75));border:2px solid rgba(255,160,130,0.6);top:50%;left:50%;-webkit-transform:translate(-50%,-50%);transform:translate(-50%,-50%);pointer-events:none;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;font-size:20px;}

/* OVERLAY screens */
#overlay{display:none;position:absolute;top:0;left:0;right:0;bottom:0;z-index:30;background:rgba(0,0,0,0.93);overflow-y:auto;-webkit-overflow-scrolling:touch;}
#shopScreen,#msgScreen{display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;min-height:100%;padding:16px;color:#fff;text-align:center;}
.shop-title{font-size:18px;color:#ffd700;margin-bottom:6px;}
.shop-sub{font-size:11px;color:#aaa;margin-bottom:12px;}
.shop-gold{font-size:16px;color:#ffd700;margin-bottom:14px;}
.wpn-row{display:-webkit-flex;display:flex;gap:10px;-webkit-justify-content:center;justify-content:center;-webkit-flex-wrap:wrap;flex-wrap:wrap;margin-bottom:14px;}
.wpn-card{background:#111;border:2px solid #444;border-radius:10px;padding:10px;min-width:100px;cursor:pointer;}
.wpn-card.owned{border-color:#ffd700;}.wpn-card.equipped{border-color:#44ff44;background:#0a1a0a;}
.wpn-icon{font-size:30px;margin-bottom:3px;}
.wpn-name{font-size:10px;color:#fff;margin-bottom:2px;}
.wpn-stat{font-size:9px;color:#aaa;margin-bottom:4px;}
.wpn-price{font-size:10px;color:#ffd700;}
.wpn-btn{margin-top:5px;padding:4px 9px;border:none;border-radius:4px;font-size:10px;cursor:pointer;font-weight:bold;}
.shop-go{padding:10px 22px;background:#ffd700;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:bold;color:#000;margin-top:8px;}
#msgScreen{font-size:13px;line-height:2;}
#msgScreen button{margin-top:12px;padding:10px 22px;background:#ffd700;border:none;border-radius:7px;font-size:13px;cursor:pointer;font-weight:bold;color:#000;}
#bossbar{display:none;position:absolute;top:10px;left:50%;-webkit-transform:translateX(-50%);transform:translateX(-50%);width:55%;z-index:5;}
#bossname{font-size:10px;color:#ff5555;text-align:center;margin-bottom:2px;}
#bossbg{height:10px;background:#300;border:2px solid #f44;border-radius:4px;overflow:hidden;}
#bossfill{height:100%;background:-webkit-linear-gradient(left,#ff2200,#ff8800);background:linear-gradient(90deg,#ff2200,#ff8800);width:100%;-webkit-transition:width 0.15s;transition:width 0.15s;}
#killbar{position:absolute;top:10px;left:8px;font-size:10px;color:rgba(255,255,255,0.55);z-index:5;}
#pwrbar{position:absolute;top:10px;right:8px;font-size:10px;color:#fff;z-index:5;text-align:right;line-height:1.6;}
</style>

<script>

  CanvasRenderingContext2D.prototype.ellipse=function(x,y,rx,ry,rot,sA,eA,ac){
    this.save();this.translate(x,y);this.rotate(rot);this.scale(rx,ry);
    this.arc(0,0,1,sA,eA,ac);this.restore();
  };
}
// requestAnimationFrame polyfill
window.requestAnimationFrame=window.requestAnimationFrame||window.webkitRequestAnimationFrame||function(cb){return setTimeout(cb,16);};

// ═══ CANVAS ═══
var C=document.getElementById('c'),X=C.getContext('2d'),W=0,H=0;
function resize(){var r=document.getElementById('gameArea').getBoundingClientRect();W=Math.round(r.width);H=Math.round(r.height);C.width=W;C.height=H;}
window.addEventListener('resize',function(){resize();initLevel();});

// ═══ AUDIO ═══
var AC=null,musicNodes=[],musicLvl=-1,musicOn=false;
var THEMES=[
  {bpm:108,mel:[294,311,370,392,440,466,523,466,440,392,370,311,294,311,370,440],bas:[147,147,185,196,196,147,147,196],wm:'sawtooth',wb:'triangle',rev:0.3,fil:3000},
  {bpm:92, mel:[294,349,392,440,523,440,392,349,294,261,294,349,392,523,440,294],bas:[147,175,196,220,175,147,196,175],wm:'sine',   wb:'sine',    rev:0.5,fil:2000},
  {bpm:88, mel:[330,349,415,440,494,523,622,523,494,440,415,349,330,349,415,494],bas:[165,175,208,220,220,165,175,208],wm:'sawtooth',wb:'sawtooth',rev:0.4,fil:2500},
  {bpm:120,mel:[294,330,349,392,440,494,523,494,440,392,349,330,294,349,392,440],bas:[147,165,175,196,196,147,165,175],wm:'square', wb:'sawtooth',rev:0.2,fil:4000},
  {bpm:116,mel:[261,294,330,392,440,392,330,294,261,330,392,440,523,440,392,330],bas:[131,147,165,196,196,131,165,147],wm:'triangle',wb:'triangle',rev:0.35,fil:3500},
  {bpm:100,mel:[261,294,330,349,392,440,494,440,392,349,330,294,261,330,392,440],bas:[131,147,165,175,196,175,165,147],wm:'square', wb:'triangle',rev:0.25,fil:3200},
];
var BOSS_THEME={bpm:150,mel:[220,233,247,220,196,208,220,196,175,185,196,175,165,175,196,220],bas:[110,117,123,110,98,104,110,98],wm:'sawtooth',wb:'sawtooth',rev:0.15,fil:5000};
function initAC(){
  if(!AC){
    try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){AC=null;}
  }
  // Safari requires resume after user gesture
  if(AC&&AC.state==='suspended'){
    try{AC.resume();}catch(e){}
  }
}
function stopMusic(){musicNodes.forEach(function(n){try{n.stop();}catch(e){}});musicNodes=[];musicOn=false;}
var musicMuted=false;
function toggleMusic(){
  musicMuted=!musicMuted;
  document.getElementById('musBtn').textContent=musicMuted?'🔇':'🔊';
  if(musicMuted){stopMusic();}
  else{musicLvl=-1;if(AC)startMusic();else{initAC();startMusic();}}
}
function playTheme(th){
  if(!AC)return;stopMusic();musicOn=true;
  var bl=60/th.bpm,now=AC.currentTime+0.05;
  var mg=AC.createGain();mg.gain.value=0.18;mg.connect(AC.destination);musicNodes.push(mg);
  var fl=AC.createBiquadFilter();fl.type='lowpass';fl.frequency.value=th.fil||3000;fl.connect(mg);
  var dl=AC.createDelay(0.5);dl.delayTime.value=0.18;
  var dg=AC.createGain();dg.gain.value=th.rev||0.25;dl.connect(dg);dg.connect(fl);dg.connect(dl);
  var loops=8;
  // Melody
  for(var lp=0;lp<loops;lp++)for(var i=0;i<th.mel.length;i++){
    var t=now+lp*(th.mel.length*bl*0.5)+i*bl*0.5;
    var o=AC.createOscillator(),g=AC.createGain();
    o.type=th.wm;o.frequency.value=th.mel[i];
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.2,t+0.02);
    g.gain.setValueAtTime(0.2,t+bl*0.35);g.gain.linearRampToValueAtTime(0,t+bl*0.48);
    o.connect(g);g.connect(fl);o.start(t);o.stop(t+bl*0.5);musicNodes.push(o);
  }
  // Bass
  for(var lp=0;lp<loops;lp++)for(var i=0;i<th.bas.length;i++){
    var t=now+lp*(th.bas.length*bl)+i*bl;
    var o=AC.createOscillator(),g=AC.createGain();
    o.type=th.wb;o.frequency.value=th.bas[i];
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.13,t+0.03);
    g.gain.setValueAtTime(0.13,t+bl*0.6);g.gain.linearRampToValueAtTime(0,t+bl*0.9);
    o.connect(g);g.connect(fl);o.start(t);o.stop(t+bl);musicNodes.push(o);
  }
  // Drums
  for(var lp=0;lp<loops;lp++)for(var b=0;b<8;b++){
    var t=now+lp*(8*bl)+b*bl;
    var buf=AC.createBuffer(1,Math.floor(AC.sampleRate*0.12),AC.sampleRate);
    var dd=buf.getChannelData(0);for(var s=0;s<dd.length;s++)dd[s]=Math.random()*2-1;
    var src=AC.createBufferSource(),gd=AC.createGain(),fd=AC.createBiquadFilter();
    src.buffer=buf;
    if(b%2===0){fd.type='lowpass';fd.frequency.value=120;gd.gain.setValueAtTime(0.28,t);gd.gain.exponentialRampToValueAtTime(0.001,t+0.1);}
    else{fd.type='highpass';fd.frequency.value=5000;gd.gain.setValueAtTime(0.06,t);gd.gain.exponentialRampToValueAtTime(0.001,t+0.06);}
    src.connect(fd);fd.connect(gd);gd.connect(mg);src.start(t);musicNodes.push(src);
  }
  var tot=loops*8*bl;
  setTimeout(function(){if(musicOn)playTheme(th);},(tot-0.4)*1000);
}
function startMusic(){
  if(musicMuted)return;
  var th=bossOn?BOSS_THEME:THEMES[Math.min(lvl,THEMES.length-1)];
  var key=bossOn?99:lvl;
  if(musicLvl===key)return;
  musicLvl=key;playTheme(th);
}
function sfx(freq,type,dur,vol){
  if(!AC)return;var o=AC.createOscillator(),g=AC.createGain();
  o.type=type||'square';o.frequency.value=freq||440;
  g.gain.setValueAtTime(vol||0.12,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+(dur||0.1));
  o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+(dur||0.1));
}
function sfxJump(){sfx(300,'square',0.1,0.1);setTimeout(function(){sfx(440,'square',0.08,0.08);},60);}
function sfxCoin(){sfx(880,'sine',0.06,0.14);setTimeout(function(){sfx(1320,'sine',0.08,0.12);},50);}
function sfxShoot(){sfx(280,'sawtooth',0.07,0.09);}
function sfxHit(){sfx(150,'sawtooth',0.05,0.15);}
function sfxBonus(){[523,659,784,1047].forEach(function(f,i){setTimeout(function(){sfx(f,'square',0.09,0.13);},i*65);});}

document.addEventListener('touchstart',function F(){initAC();if(AC&&!musicOn)startMusic();document.removeEventListener('touchstart',F);},{once:true,passive:true});
document.addEventListener('mousedown',function F(){initAC();if(AC&&!musicOn)startMusic();document.removeEventListener('mousedown',F);},{once:true});

// ═══ PLATFORMS (Mario style — fixed heights, flat ground) ═══
function makePlatforms(){
  var w=WORLDS[lvl];
  var GY=H-50; // flat ground line
  var ph=18;   // platform thickness
  var h1=GY-105,h2=GY-195,h3=GY-275;
  if(h3<55)h3=55;if(h2<h3+70)h2=h3+80;if(h1<h2+70)h1=h2+80;
  var pats=[h1,h2,h1,h3,h2,h1,h2,h3,h1,h2,h1,h2,h1,h3,h2,h1,h2,h3,h1,h2,
            h1,h2,h1,h3,h2,h1,h2,h3,h1,h2];
  var plats=[{x:0,y:GY,w:WORLD_W,h:H-GY,c:w.gnd,d:16,isGnd:true}];
  for(var i=0;i<pats.length;i++){
    plats.push({x:180+i*260,y:pats[i],w:190,h:ph,c:w.plat,d:8});
  }
  return plats;
}

// ═══ ENEMY DEFINITIONS (unique shapes per country) ═══
// Each draw function draws at center (cx,cy)
function enTR0(cx,cy){ // Ottoman soldier
  X.fillStyle='#cc3333';X.fillRect(cx-9,cy-8,18,16);
  X.fillStyle='#ffcc88';X.fillRect(cx-5,cy-19,10,12);
  X.fillStyle='#cc0000';X.fillRect(cx-6,cy-27,12,9);X.fillRect(cx-8,cy-24,16,3);
  X.fillRect(cx-1,cy-31,2,5);
  X.strokeStyle='#2a1200';X.lineWidth=1.8;

// ═══ SPAWN ═══
function spawnWave(){
  var et=WORLDS[lvl].et,defs=EN_DEFS[et];
  if(enemies.length>=15)return;
  var n=Math.min(6,15-enemies.length);
  for(var i=0;i<n;i++){
    var def=defs[Math.floor(Math.random()*defs.length)];
    var hp=2+Math.floor(lvl*0.7);
    var wx=P.x+W+200+Math.random()*(WORLD_W-P.x-W-400);
    if(wx>WORLD_W-200)wx=WORLD_W-400;
    enemies.push({x:wx,y:platforms[0].y-200,w:def.w,h:def.h,
      vx:(Math.random()>0.5?1:-1)*(0.6+lvl*0.18),
      vy:0,gr:false,hp:hp,mhp:hp,col:def.col,draw:def.draw,dead:false});
  }
}
function spawnCoins(){
  coins=[];bonuses=[];
  var GY=platforms[0].y;
  // Coins above each platform (Mario-style row)
  for(var i=1;i<platforms.length;i++){
    var p=platforms[i];
    var sp=(p.w-40)/3;
    for(var c=0;c<4;c++)
      coins.push({x:p.x+20+c*sp,y:p.y-38,w:14,h:14,bob:c*0.6,done:false});
    if(i%4===0)
      bonuses.push({x:p.x+p.w/2-14,y:p.y-62,w:28,h:28,
        type:['spd','dbl','shd'][(i/4|0)%3],hit:false,bounce:0});
  }
  // Ground-level coins every 200px
  for(var g=0;g<Math.floor(WORLD_W/200);g++)
    coins.push({x:80+g*200,y:GY-34,w:14,h:14,bob:g*0.4,done:false});
}
function spawnBoss(){
  var bd=WORLDS[lvl].boss;
  boss={x:WORLD_W-400,y:platforms[0].y-200,w:72,h:72,
    vx:-bd.spd,vy:0,gr:false,
    hp:bd.hp,mhp:bd.hp,col:bd.col,glow:bd.g2,spd:bd.spd,
    emoji:bd.emoji,name:bd.name,p2:false,dead:false};
  bossOn=true;musicLvl=-1;startMusic();
  document.getElementById('bossbar').style.display='block';
  document.getElementById('bossname').textContent=bd.emoji+' '+bd.name;
  document.getElementById('bossfill').style.width='100%';
}
function initLevel(){
  if(!W||!H)return;
  platforms=makePlatforms();
  P.x=150;P.y=platforms[0].y-200;P.vx=0;P.vy=0;P.inv=0;P.gr=false;
  bullets=[];parts=[];boss=null;bossOn=false;shopShown=false;
  enemies=[];killCount=0;CAM_X=0;subZone=0;
  PWR={spd:0,dbl:0,shd:0};
  document.getElementById('bossbar').style.display='none';
  document.getElementById('overlay').style.display='none';
  document.getElementById('msgScreen').style.display='none';
  document.getElementById('shopScreen').style.display='flex';
  spawnCoins();spawnWave();updateHUD();
  musicLvl=-1;if(AC)startMusic();
}
function updateHUD(){
  var w=WORLDS[lvl];
  document.getElementById('hcountry').textContent=w.flag+' '+w.name;
  document.getElementById('hscore').textContent=score;
  document.getElementById('hgold').textContent=w.cur+gold;
  var h='';for(var i=0;i<lives;i++)h+='❤️';
  document.getElementById('hlives').textContent=h||'💀';
  document.getElementById('killbar').textContent='👾 '+killCount+'/50';
  // Power-ups
  var p='';
  if(PWR.spd>0)p+='⚡'+Math.ceil(PWR.spd/60)+'s ';
  if(PWR.dbl>0)p+='2x'+Math.ceil(PWR.dbl/60)+'s ';
  if(PWR.shd>0)p+='🛡'+Math.ceil(PWR.shd/60)+'s';
  document.getElementById('pwrbar').textContent=p;
}

// ═══ SHOP ═══
function openShop(){
  shopShown=true;running=false;
  var w=WORLDS[lvl];
  document.getElementById('overlay').style.display='block';
  document.getElementById('shopScreen').style.display='flex';
  document.getElementById('msgScreen').style.display='none';
  document.getElementById('shopTitle').textContent='🛒 '+w.flag+' '+w.name+' Dükkan';
  document.getElementById('shopGold').textContent=w.cur+gold;
  var row=document.getElementById('wpnRow');row.innerHTML='';
  WPNS.forEach(function(wp){
    var owned=ownedW.indexOf(wp.id)>=0,eq=equip===wp.id;
    var card=document.createElement('div');
    card.className='wpn-card'+(owned?' owned':'')+(eq?' equipped':'');
    var bc=eq?'#44ff44':owned?'#4488ff':gold>=wp.price?'#ffd700':'#555';
    var bt=eq?'Seçili':owned?'Kullan':w.cur+wp.price;
    card.innerHTML='<div class="wpn-icon">'+wp.icon+'</div>'
      +'<div class="wpn-name">'+wp.name+'</div>'
      +'<div class="wpn-stat">'+wp.desc+'</div>'
      +'<div class="wpn-price">'+(wp.price?w.cur+wp.price:'Ücretsiz')+'</div>'
      +'<button class="wpn-btn" style="background:'+bc+';color:#000;" onclick="buyWpn('+wp.id+')">'+bt+'</button>';
    row.appendChild(card);
  });
}
function buyWpn(id){
  var wp=WPNS.find(function(w){return w.id===id;});
  if(ownedW.indexOf(id)<0){if(gold<wp.price){return;}gold-=wp.price;ownedW.push(id);}
  equip=id;openShop();
}
function startBoss(){
  document.getElementById('overlay').style.display='none';
  running=true;shopShown=false;spawnBoss();
}
function showMsg(txt,auto){
  document.getElementById('overlay').style.display='block';
  document.getElementById('shopScreen').style.display='none';
  document.getElementById('msgScreen').style.display='flex';
  document.getElementById('msgtxt').innerHTML=txt.replace(/\n/g,'<br>');
  var btn=document.querySelector('#msgScreen button');
  if(auto){btn.style.display='none';setTimeout(function(){document.getElementById('overlay').style.display='none';running=true;initLevel();},2400);}
  else btn.style.display='block';
}
function restart(){score=0;lives=3;lvl=0;gold=0;ownedW=[0];equip=0;running=true;initLevel();}

// ═══ CONTROLS ═══
// Move joystick
var jDx=0,jOn=false;
var JZ=document.getElementById('jzone'),JK=document.getElementById('jknob');
function jKR(){return JZ.getBoundingClientRect().width*0.36;}
function jS(cx,cy){jOn=true;jM(cx,cy);}
function jM(cx,cy){
  if(!jOn)return;
  var r=JZ.getBoundingClientRect(),kr=jKR();
  var dx=Math.max(-kr,Math.min(kr,cx-(r.left+r.width/2)));
  JK.style.transform='translate(calc(-50% + '+dx+'px),-50%)';
  jDx=dx/kr;
}
function jE(){jOn=false;JK.style.transform='translate(-50%,-50%)';jDx=0;}
JZ.addEventListener('touchstart',function(e){e.preventDefault();jS(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
JZ.addEventListener('touchmove', function(e){e.preventDefault();jM(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
JZ.addEventListener('touchend',  function(e){e.preventDefault();jE();},{passive:false});
JZ.addEventListener('mousedown', function(e){jS(e.clientX,e.clientY);});

// Fire joystick — SEPARATE touch tracking, no bleed to move joystick
var fDx=1,fDy=0,fOn=false,fTid=-1;
var FZ=document.getElementById('fzone'),FK=document.getElementById('fknob');
function fKR(){return FZ.getBoundingClientRect().width*0.36;}
function fS(cx,cy,tid){fOn=true;fTid=tid;fM(cx,cy);}
function fM(cx,cy){
  if(!fOn)return;
  var r=FZ.getBoundingClientRect(),kr=fKR();
  var dx=cx-(r.left+r.width/2),dy=cy-(r.top+r.height/2);
  var d=Math.sqrt(dx*dx+dy*dy);
  if(d>kr){dx=dx/d*kr;dy=dy/d*kr;}
  FK.style.transform='translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px))';
  if(d>kr*0.25){fDx=dx/kr;fDy=dy/kr;shoot(fDx,fDy);}
}
function fE(){fOn=false;fTid=-1;FK.style.transform='translate(-50%,-50%)';}
FZ.addEventListener('touchstart',function(e){e.preventDefault();var t=e.changedTouches[0];fS(t.clientX,t.clientY,t.identifier);},{passive:false});

var keys={};
document.addEventListener('keydown',function(e){
  keys[e.code]=true;
  if(e.code==='ArrowUp'||e.code==='KeyW'){e.preventDefault();doJump();}
  if(e.code==='Space'||e.code==='KeyZ'){e.preventDefault();shoot(P.dir,0);}
});
document.addEventListener('keyup',function(e){keys[e.code]=false;});
function goL(){return keys['ArrowLeft']||keys['KeyA']||jDx<-0.18;}
function goR(){return keys['ArrowRight']||keys['KeyD']||jDx>0.18;}

function doJump(){
  if(P.gr){
    var jspd=PWR.spd>0?16:14;
    P.vy=-jspd;P.vx+=(P.dir>0?3:-3); // forward boost on jump
    P.gr=false;sfxJump();
    part(P.x+P.w/2,P.y+P.h,'#aaaaff',4);
  }
}

var sCool=0;
function shoot(dx,dy){
  if(sCool>0)return;
  if(!dx)dx=P.dir;if(!dy)dy=0;
  var d=Math.sqrt(dx*dx+dy*dy);if(d<0.01){dx=P.dir;dy=0;}else{dx/=d;dy/=d;}
  if(dx>0.1)P.dir=1;else if(dx<-0.1)P.dir=-1;
  var wp=WPNS.find(function(w){return w.id===equip;})||WPNS[0];
  var et=WORLDS[lvl].et;
  sCool=et==='JP'?6:et==='NO'?14:et==='CN'?8:10;
  var bx=P.x+(dx>0?P.w+2:-4),by=P.y+P.h/2;
  if(et==='TR'){
    bullets.push({x:bx,y:by,vx:wp.spd*dx,vy:wp.spd*dy*0.6,r:wp.r,dmg:wp.dmg,col:wp.col,glo:wp.glo,life:60,tr:[],type:'n'});
  }else if(et==='JP'){
    for(var a=-1;a<=1;a++)bullets.push({x:bx,y:by,vx:wp.spd*dx+(-dy*a*2),vy:wp.spd*dy+(dx*a*2),r:5,dmg:wp.dmg,col:'#ccc',glo:'#fff',life:45,tr:[],type:'s',rot:0});
  }else if(et==='EG'){
    bullets.push({x:bx,y:by,vx:wp.spd*0.8*dx,vy:wp.spd*0.8*dy,r:7,dmg:wp.dmg,col:'#8844ff',glo:'#cc44ff',life:70,tr:[],type:'w',t:0,pdx:-dy,pdy:dx});
  }else if(et==='NO'){
    bullets.push({x:bx,y:by,vx:wp.spd*0.9*dx,vy:wp.spd*0.9*dy-3,r:8,dmg:wp.dmg,col:'#888',glo:'#ccc',life:55,tr:[],type:'a',rot:0});
  }else if(et==='CN'){
    bullets.push({x:bx,y:by-4,vx:wp.spd*dx,vy:wp.spd*dy,r:6,dmg:wp.dmg,col:'#ff6600',glo:'#ffaa00',life:50,tr:[],type:'f'});
    bullets.push({x:bx,y:by+4,vx:wp.spd*dx,vy:wp.spd*dy,r:6,dmg:wp.dmg,col:'#ffcc00',glo:'#ffff00',life:50,tr:[],type:'f'});
  }else{
    bullets.push({x:bx,y:by,vx:wp.spd*1.1*dx,vy:wp.spd*1.1*dy-1,r:8,dmg:wp.dmg,col:'#333',glo:'#666',life:65,tr:[],type:'c'});
  }
  if(PWR.dbl>0)bullets.push({x:bx,y:by-10,vx:wp.spd*dx,vy:wp.spd*dy-2,r:4,dmg:1,col:'#44ffff',glo:'#00ffff',life:55,tr:[],type:'n'});
  sfxShoot();
}

function part(x,y,col,n){
  for(var i=0;i<n;i++){
    var a=Math.random()*Math.PI*2,s=1.5+Math.random()*3;
    parts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,col:col,l:22,ml:22,r:2+Math.random()*2.5});
  }
}
function collide(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function resolve(obj){
  obj.gr=false;
  for(var i=0;i<platforms.length;i++){
    var p=platforms[i];if(!collide(obj,p))continue;
    var ox=Math.min(obj.x+obj.w,p.x+p.w)-Math.max(obj.x,p.x);
    var oy=Math.min(obj.y+obj.h,p.y+p.h)-Math.max(obj.y,p.y);
    if(oy<=ox){
      if(obj.y+obj.h/2<p.y+p.h/2){obj.y=p.y-obj.h;obj.vy=0;obj.gr=true;}
      else{obj.y=p.y+p.h;obj.vy=0;}
    }else{
      if(obj.vx!==undefined)obj.vx*=-1;
      if(obj.x+obj.w/2<p.x+p.w/2)obj.x=p.x-obj.w;else obj.x=p.x+p.w;
    }
  }
}
function die(){
  if(PWR.shd>0){PWR.shd=0;part(P.x+P.w/2,P.y+P.h/2,'#44ffff',20);P.inv=60;updateHUD();return;}
  lives--;part(P.x+P.w/2,P.y+P.h/2,'#ff2200',16);
  P.inv=90;P.x=150;P.y=platforms[0].y-200;P.vx=0;P.vy=0;CAM_X=0;
  updateHUD();if(lives<=0){showMsg('💀 OYUN BİTTİ\nSKOR: '+score);}
}

// ═══ UPDATE ═══
function update(){
  if(!running||shopShown)return;
  if(sCool>0)sCool--;
  if(PWR.spd>0)PWR.spd--;if(PWR.dbl>0)PWR.dbl--;if(PWR.shd>0)PWR.shd--;

  // Player
  var spd=(1.8+lvl*0.05)*(PWR.spd>0?1.65:1);
  if(goL()){P.vx=-(jOn?spd*Math.max(0.22,Math.abs(jDx)):spd);P.dir=-1;}
  else if(goR()){P.vx=(jOn?spd*Math.max(0.22,Math.abs(jDx)):spd);P.dir=1;}
  else P.vx*=0.55;
  P.vy=Math.min(P.vy+0.52,16);
  P.x+=P.vx;P.y+=P.vy;
  if(P.x<0)P.x=0;if(P.x>WORLD_W-P.w)P.x=WORLD_W-P.w;
  if(P.y>H+80)die();
  resolve(P);if(P.inv>0)P.inv--;
  P.at++;if(P.at>8){P.af=(P.af+1)%4;P.at=0;}

  // Camera smooth follow
  var tc=P.x-W*0.38;if(tc<0)tc=0;if(tc>WORLD_W-W)tc=WORLD_W-W;
  CAM_X+=(tc-CAM_X)*0.11;
  subZone=Math.min(3,Math.floor(CAM_X/(WORLD_W/4))|0);

  // Bullets
  for(var i=bullets.length-1;i>=0;i--){
    var b=bullets[i];
    b.tr.push({x:b.x,y:b.y});if(b.tr.length>8)b.tr.shift();
    b.x+=b.vx;
    if(b.type==='w'){b.t=(b.t||0)+0.3;var wv=Math.sin(b.t)*2;b.x+=wv*(b.pdx||0);b.y+=wv*(b.pdy||1);}
    if(b.type==='a'){b.rot=(b.rot||0)+0.3;b.vy+=0.15;}
    if(b.type==='s')b.rot=(b.rot||0)+0.4;
    if(b.type==='c')b.vy+=0.18;
    b.y+=b.vy||0;b.life--;
    for(var j=0;j<platforms.length;j++){var p=platforms[j];if(b.x>p.x&&b.x<p.x+p.w&&b.y>p.y&&b.y<p.y+p.h){b.life=0;part(b.x,b.y,b.col,4);}}
    if(b.x<-60||b.x>WORLD_W+60||b.y>H+60)b.life=0;
    if(b.life<=0){bullets.splice(i,1);continue;}
    if(!bossOn){
      for(var j=enemies.length-1;j>=0;j--){
        var en=enemies[j];if(en.dead)continue;
        if(Math.abs(b.x-en.x-en.w/2)<en.w/2+b.r&&Math.abs(b.y-en.y-en.h/2)<en.h/2+b.r){
          b.life=0;part(b.x,b.y,en.col,7);en.hp-=(b.dmg||1);sfxHit();
          if(en.hp<=0){part(en.x+en.w/2,en.y+en.h/2,en.col,14);score+=100*(lvl+1);killCount++;gold+=20+Math.random()*25|0;en.dead=true;sfxCoin();updateHUD();
            if(killCount>=50&&!shopShown&&!bossOn)openShop();
            else if(enemies.filter(function(e){return !e.dead;}).length<5)spawnWave();
          }
        }
      }
    }
    if(boss&&!boss.dead&&bossOn){
      if(Math.abs(b.x-boss.x-boss.w/2)<boss.w/2+b.r&&Math.abs(b.y-boss.y-boss.h/2)<boss.h/2+b.r){
        b.life=0;part(b.x,b.y,'#fff',5);part(b.x,b.y,boss.glow,4);boss.hp-=(b.dmg||1);sfxHit();
        document.getElementById('bossfill').style.width=Math.max(0,boss.hp/boss.mhp*100)+'%';
        if(boss.hp<=0){
          boss.dead=true;bossOn=false;document.getElementById('bossbar').style.display='none';
          score+=3000*(lvl+1);gold+=500;updateHUD();
          for(var k=0;k<30;k++)part(boss.x+boss.w/2,boss.y+boss.h/2,['#ff4400','#ffcc00','#fff','#ff88ff'][k%4],1);
          setTimeout(function(){lvl++;if(lvl>=WORLDS.length){showMsg('🏆 TEBRİKLER!\nTÜM DÜNYAYI GEZDİN!\nSKOR: '+score);}else{showMsg(WORLDS[lvl].flag+' '+WORLDS[lvl].name+'\nBÖLÜMÜ!\nSKOR: '+score,true);}},1400);
        }
      }
    }
  }

  // Enemies
  if(!bossOn){
    for(var i=enemies.length-1;i>=0;i--){
      var en=enemies[i];if(en.dead){enemies.splice(i,1);continue;}
      en.vy=Math.min(en.vy+0.5,14);en.x+=en.vx;en.y+=en.vy;resolve(en);
      if(en.x<10||en.x>WORLD_W-en.w-10)en.vx*=-1;
      if(P.inv===0&&collide(P,en))die();
    }
  }

  // Boss
  if(boss&&!boss.dead&&bossOn){
    if(boss.hp<boss.mhp/2)boss.p2=true;
    var bs=boss.p2?boss.spd*1.55:boss.spd;
    boss.vx=(P.x<boss.x)?-bs:bs;
    boss.vy=Math.min(boss.vy+0.52,14);boss.x+=boss.vx;boss.y+=boss.vy;resolve(boss);
    if(boss.gr&&Math.random()<0.025*(boss.p2?2:1))boss.vy=-13;
    if(boss.x<0)boss.x=0;if(boss.x>WORLD_W-boss.w)boss.x=WORLD_W-boss.w;
    if(P.inv===0&&collide(P,boss))die();
  }

  // Coins
  for(var i=coins.length-1;i>=0;i--){
    var cn=coins[i];cn.bob+=0.07;
    if(collide(P,cn)){score+=50;gold+=10;sfxCoin();updateHUD();part(cn.x+7,cn.y+7,'#ffd700',4);coins.splice(i,1);}
  }

  // Bonuses
  for(var i=0;i<bonuses.length;i++){
    var bn=bonuses[i];if(bn.bounce>0)bn.bounce--;
    if(!bn.hit&&collide(P,bn)){
      bn.hit=true;bn.bounce=10;sfxBonus();part(bn.x+14,bn.y,'#ffcc00',12);
      if(bn.type==='spd'){PWR.spd=360;score+=200;}
      else if(bn.type==='dbl'){PWR.dbl=360;score+=200;}
      else{PWR.shd=360;lives=Math.min(lives+1,5);score+=200;}
      updateHUD();
    }
  }

  // Particles
  for(var i=parts.length-1;i>=0;i--){
    var pt=parts[i];pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.1;pt.l--;if(pt.l<=0)parts.splice(i,1);
  }
}

function drawBoss(){

  var bx=sx(boss.x)+boss.w/2,by=boss.y+boss.h/2;
  X.save();X.translate(bx,by);if(boss.vx>0)X.scale(-1,1);
  X.shadowColor=boss.glow;X.shadowBlur=boss.p2?36:18;
  var bc=boss.p2?'#ff1100':boss.col;

    X.fillStyle=bc;

    }
    // Dragon head
    X.fillStyle=bc;X.beginPath();X.ellipse(0,-hh*0.5,hw*0.8,hw*0.65,0,0,Math.PI*2);X.fill();
    // Antlers
    X.strokeStyle='#ffaa00';X.lineWidth=4;
    X.beginPath();X.moveTo(-hw*0.3,-hh*0.8);X.lineTo(-hw*0.5,-hh-20);X.lineTo(-hw*0.7,-hh-12);X.stroke();
    X.beginPath();X.moveTo(hw*0.3,-hh*0.8);X.lineTo(hw*0.5,-hh-20);X.lineTo(hw*0.7,-hh-12);X.stroke();
    // Whiskers
    X.strokeStyle='#ffcc00';X.lineWidth=2;
    X.beginPath();X.moveTo(-hw*0.5,-hh*0.4);X.lineTo(-hw-16,-hh*0.2);X.stroke();
    X.beginPath();X.moveTo(-hw*0.5,-hh*0.55);X.lineTo(-hw-14,-hh*0.7);X.stroke();
    X.shadowBlur=0;X.fillStyle=boss.p2?'#fff':'#ff4400';
    X.beginPath();X.ellipse(-hw*0.25,-hh*0.5,7,6,0,0,Math.PI*2);X.fill();
    X.beginPath();X.ellipse(hw*0.25,-hh*0.5,7,6,0,0,Math.PI*2);X.fill();
    X.fillStyle='#000';X.beginPath();X.arc(-hw*0.25,-hh*0.5,3,0,Math.PI*2);X.fill();X.beginPath();X.arc(hw*0.25,-hh*0.5,3,0,Math.PI*2);X.fill();
    // Flame breath
    X.fillStyle='rgba(255,100,0,0.6)';X.beginPath();X.ellipse(-hw-14,-hh*0.45,14,6,0.3,0,Math.PI*2);X.fill();
  }else{ // Wyvern — British dragon (different from TR)
    X.fillStyle=bc;X.beginPath();X.ellipse(0,10,hw*0.9,hh,0,0,Math.PI*2);X.fill();
    // Wyvern head — more triangular
    X.fillStyle=bc;
    X.beginPath();X.moveTo(-hw*0.7,-hh*0.2);X.lineTo(-hw*0.1,-hh-8);X.lineTo(hw*0.5,-hh*0.3);X.lineTo(hw*0.3,0);X.closePath();X.fill();
    // Bat wings
    X.fillStyle=shadeCol(bc,-20);
    X.beginPath();X.moveTo(hw,2);X.lineTo(hw+35,-20);X.lineTo(hw+30,14);X.lineTo(hw+50,-6);X.lineTo(hw+18,22);X.fill();
    X.beginPath();X.moveTo(-hw,2);X.lineTo(-hw-35,-20);X.lineTo(-hw-30,14);X.lineTo(-hw-50,-6);X.lineTo(-hw-18,22);X.fill();
    // Tail spike
    X.fillStyle='#ffaa00';X.beginPath();X.moveTo(hw*0.3,hh+4);X.lineTo(hw+24,hh+18);X.lineTo(hw*0.1,hh+2);X.fill();
    X.shadowBlur=0;X.fillStyle=boss.p2?'#fff':'#ff6600';
    X.beginPath();X.ellipse(-hw*0.2,-hh*0.4,7,5,0,0,Math.PI*2);X.fill();
    X.beginPath();X.ellipse(hw*0.15,-hh*0.5,7,5,0,0,Math.PI*2);X.fill();
    X.fillStyle='#000';X.beginPath();X.arc(-hw*0.2,-hh*0.4,3,0,Math.PI*2);X.fill();X.beginPath();X.arc(hw*0.15,-hh*0.5,3,0,Math.PI*2);X.fill();
    // Fire breath
    X.fillStyle='rgba(255,80,0,0.55)';X.beginPath();X.ellipse(-hw-18,-hh*0.3,16,7,0.3,0,Math.PI*2);X.fill();
    X.fillStyle='rgba(255,200,0,0.45)';X.beginPath();X.ellipse(-hw-12,-hh*0.32,10,4,0.3,0,Math.PI*2);X.fill();
  }
  X.restore();
}

function shadeCol(c,a){var n=parseInt(c.replace('#',''),16);var r=Math.max(0,Math.min(255,(n>>16)+a));var g=Math.max(0,Math.min(255,((n>>8)&0xff)+a));var b=Math.max(0,Math.min(255,(n&0xff)+a));return '#'+((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1);}
function sx(wx){return wx-CAM_X;}

// ═══ DRAW ═══
function draw(){
  X.clearRect(0,0,W,H);
  WORLDS[lvl].bg();

  // Ground 2.5D
  var gnd=platforms[0],GX=sx(gnd.x),d=16;
  X.fillStyle=shadeCol(WORLDS[lvl].gndd,-55);
  X.beginPath();X.moveTo(GX+gnd.w,gnd.y);X.lineTo(GX+gnd.w+d,gnd.y+d);X.lineTo(GX+gnd.w+d,H);X.lineTo(GX+gnd.w,H);X.closePath();X.fill();
  X.fillStyle=WORLDS[lvl].gndd;X.fillRect(GX,gnd.y,gnd.w,H-gnd.y);
  X.fillStyle='rgba(255,255,255,0.1)';X.fillRect(GX,gnd.y,gnd.w,3);

  // Platforms 2.5D
  for(var i=1;i<platforms.length;i++){
    var p=platforms[i],px=sx(p.x),pd=8;
    if(px+p.w+pd<0||px>W)continue;
    X.fillStyle=shadeCol(p.c,-42);
    X.beginPath();X.moveTo(px+p.w,p.y);X.lineTo(px+p.w+pd,p.y+pd);X.lineTo(px+p.w+pd,p.y+p.h+pd);X.lineTo(px+p.w,p.y+p.h);X.closePath();X.fill();
    X.fillStyle=shadeCol(p.c,-62);
    X.beginPath();X.moveTo(px,p.y+p.h);X.lineTo(px+pd,p.y+p.h+pd);X.lineTo(px+p.w+pd,p.y+p.h+pd);X.lineTo(px+p.w,p.y+p.h);X.closePath();X.fill();
    X.fillStyle=p.c;X.fillRect(px,p.y,p.w,p.h);
    X.fillStyle='rgba(255,255,255,0.2)';X.fillRect(px,p.y,p.w,3);
  }

  // Coins — leader face
  var LD=[{col:'#cc2200',bg:'#ffe0cc'},{col:'#cc0022',bg:'#ffccdd'},{col:'#ccaa00',bg:'#fff8cc'},
          {col:'#224488',bg:'#cce0ff'},{col:'#cc0000',bg:'#ffcccc'},{col:'#000088',bg:'#ccddff'}];
  coins.forEach(function(cn){
    var cx=sx(cn.x);if(cx<-20||cx>W+20)return;
    var by=Math.sin(cn.bob)*3;
    var ld=LD[lvl];
    X.save();X.translate(cx+7,cn.y+7+by);
    X.shadowColor='#ffd700';X.shadowBlur=7;
    X.fillStyle='#ffd700';X.beginPath();X.arc(0,0,8,0,Math.PI*2);X.fill();
    X.fillStyle=ld.bg;X.beginPath();X.arc(0,0,6.5,0,Math.PI*2);X.fill();
    X.fillStyle=ld.col;
    X.beginPath();X.arc(0,-1,3.5,0,Math.PI*2);X.fill();
    X.beginPath();X.ellipse(0,3.5,3,2.2,0,0,Math.PI);X.fill();
    X.strokeStyle='#cc9900';X.lineWidth=1.2;X.shadowBlur=0;
    X.beginPath();X.arc(0,0,8,0,Math.PI*2);X.stroke();
    X.fillStyle='rgba(180,140,0,0.7)';X.font='bold 5px monospace';X.textAlign='center';X.textBaseline='middle';
    X.fillText(WORLDS[lvl].cur,0,0);
    X.restore();
  });

  // Bonus boxes
  bonuses.forEach(function(bn){
    var bx=sx(bn.x);if(bx<-40||bx>W+40)return;
    var by=bn.y-(bn.bounce>0?Math.sin(bn.bounce/10*Math.PI)*9:0);
    X.save();
    if(bn.hit){X.fillStyle='#666';X.fillRect(bx,by,bn.w,bn.h);X.fillStyle='#555';X.fillRect(bx+2,by+2,bn.w-4,bn.h-4);}
    else{
      var bc2=bn.type==='spd'?'#ffaa00':bn.type==='dbl'?'#44ffff':'#ff44aa';
      X.shadowColor=bc2;X.shadowBlur=10;
      X.fillStyle='#cc8800';X.fillRect(bx,by,bn.w,bn.h);
      X.fillStyle='#ffcc00';X.fillRect(bx+2,by+2,bn.w-4,bn.h-4);
      X.fillStyle='#fff';X.font='bold '+(bn.w*0.65|0)+'px monospace';X.textAlign='center';X.textBaseline='middle';X.fillText('?',bx+bn.w/2,by+bn.h/2);
      X.shadowBlur=0;X.fillStyle=bc2;X.font='9px monospace';
      X.fillText(bn.type==='spd'?'⚡':bn.type==='dbl'?'2x':'🛡',bx+bn.w/2,by+bn.h+11);
    }
    X.restore();
  });

  // Enemy shadows + draw
  enemies.forEach(function(en){
    if(en.dead)return;
    var ex=sx(en.x);if(ex<-60||ex>W+60)return;
    X.fillStyle='rgba(0,0,0,0.18)';X.beginPath();X.ellipse(ex+en.w/2,en.y+en.h+5,en.w/2,4,0,0,Math.PI*2);X.fill();
    en.draw(ex+en.w/2,en.y+en.h/2);
    var bw=en.w;
    X.fillStyle='#300';X.fillRect(ex,en.y-7,bw,3);
    X.fillStyle=en.hp/en.mhp>0.5?'#44ff44':'#ff4400';X.fillRect(ex,en.y-7,bw*(en.hp/en.mhp),3);
  });

  // Boss
  if(boss&&!boss.dead){
    X.fillStyle='rgba(0,0,0,0.25)';X.beginPath();X.ellipse(sx(boss.x+boss.w/2),boss.y+boss.h+10,boss.w/2,8,0,0,Math.PI*2);X.fill();
  }
  drawBoss();

  // Bullets
  bullets.forEach(function(b){
    var bx=sx(b.x);if(bx<-30||bx>W+30)return;
    b.tr.forEach(function(t,i){X.beginPath();X.arc(sx(t.x),t.y,b.r*0.5*(i/b.tr.length),0,Math.PI*2);X.fillStyle=b.col+'44';X.fill();});
    X.save();X.shadowColor=b.glo;X.shadowBlur=10;
    if(b.type==='s'||b.type==='a'){
      X.save();X.translate(bx,b.y);X.rotate(b.rot||0);
      X.fillStyle=b.col;
      if(b.type==='s'){for(var sa=0;sa<4;sa++){X.save();X.rotate(sa*Math.PI/2);X.fillRect(-b.r,-1,b.r*2,2);X.restore();}}
      else{X.beginPath();X.moveTo(-b.r,-b.r);X.lineTo(b.r,-b.r/2);X.lineTo(b.r,b.r/2);X.lineTo(-b.r,b.r);X.closePath();X.fill();}
      X.restore();
    }else{
      X.beginPath();X.arc(bx,b.y,b.r,0,Math.PI*2);X.fillStyle=b.col;X.fill();
      X.beginPath();X.arc(bx,b.y,b.r*0.4,0,Math.PI*2);X.fillStyle='#fff';X.fill();
    }
    X.restore();
  });

  // Player shadow
  X.fillStyle='rgba(0,0,0,0.22)';X.beginPath();X.ellipse(sx(P.x+P.w/2),P.y+P.h+6,P.w/2,5,0,0,Math.PI*2);X.fill();
  drawChar(P.x,P.y,P.dir,P.af,P.inv,WORLDS[lvl].char);

  // Shield visual
  if(PWR.shd>0){
    X.save();X.globalAlpha=0.35+Math.sin(Date.now()/120)*0.15;
    X.strokeStyle='#44ffff';X.lineWidth=3;X.shadowColor='#44ffff';X.shadowBlur=12;
    X.beginPath();X.arc(sx(P.x+P.w/2),P.y+P.h/2,24,0,Math.PI*2);X.stroke();
    X.restore();
  }

  // Particles
  parts.forEach(function(pt){
    var a=pt.l/pt.ml;X.save();X.globalAlpha=a;X.fillStyle=pt.col;X.shadowColor=pt.col;X.shadowBlur=4;
    X.beginPath();X.arc(pt.x,pt.y,pt.r*a,0,Math.PI*2);X.fill();X.restore();
  });

  // Phase 2 warning
  if(boss&&boss.p2&&!boss.dead){
    X.save();X.globalAlpha=0.6+Math.sin(Date.now()/130)*0.4;
    X.fillStyle='#ff2200';X.font='bold '+Math.max(9,H*0.03|0)+'px monospace';
    X.textAlign='center';X.fillText('⚠ PHASE 2 ⚠',W/2,24);X.restore();
  }
}

// ═══ LOOP ═══
function loop(){update();draw();requestAnimationFrame(loop);}
window.addEventListener('load',function(){setTimeout(function(){resize();initLevel();loop();},80);});
</script>
